site_name: 📚 Архив "я же это уже гуглил"
site_url: https://a18091986edu.github.io/my-knowledge-base/
repo_url: https://github.com/a18091986edu/knowledge-base

theme:
  name: materialx
  icon:
    logo: material/head-question
  features:
    - navigation.tabs        # вкладки в главном меню
    - navigation.tabs.sticky # Закрепленные вкладки
    - navigation.prune
    # - navigation.sections    # секции в сайдбаре
    - navigation.expand      # раскрытие текущей секции в сайдбаре
    - navigation.instant     # мгновенная навигация
    - navigation.top         # кнопка "наверх"
    - navigation.tracking    # отслеживание позиции
    - navigation.indexes
    - search.suggest         # подсказки в поиске
    - search.highlight       # подсветка в поиске
    - content.code.copy      # копирование кода
    - content.code.annotate
    # - toc.follow
    # - toc.integrate
    - navigation.path


  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  # - pymdownx.snippets
  - pymdownx.superfences      # для сворачиваемых блоков
  - pymdownx.details          # для сворачиваемых блоков
  - admonition                # для заметок
  - tables
  - toc:
      permalink: true
  - pymdownx.tabbed:
      alternate_style: true  # Для более красивого оформления
  - pymdownx.details  # Для ??? блоков
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - macros:
      include_dir: docs

nav:
  - Главная: index.md
  
  - DevOps:
    - devops/devops.md
    - Docker:
      - devops/docker/docker.md
      - Установка Windows в docker:
        - devops/docker/windows_in_docker.md
    - Linux: 
        - devops/linux/linux.md
        - основные команды:
          - devops/linux/commands/commands.md
        - алиасы для команд:
          - devops/linux/alias/alias.md
    - Ansible:
      - devops/ansible/ansible.md 
      - CICD Github Ansible: devops/ansible/CICD/CICD.md
      - Vars|Conditions|Loops|Filter: devops/ansible/vars_cond_loops_filter.md
      - Roles: devops/ansible/roles.md    
      - Материалы: devops/ansible/parts/materials.md
    - jpath:
      - devops/jpath/jpath.md

  - ML:
    - CUDA: ml/cuda/cuda.md
    
  
  - Python:
    - python/python.md
    - Веб-фреймворки:
      - FastAPI: python/fastapi/fastapi.md
    - Документирование: 
      - MkDoks: 
        - Развертывание: python/docs/mkdocs/mkdocs-deploy.md
    - Пакетные менеджеры: 
      - UV: python/package_managers/uv/uv.md
      - Создание пакета: python/package_managers/creating_package.md
    - Инструменты: 
      - ruff: python/tools/ruff/ruff.md
  - Tools:
    - Postman: tools/postman/postman.md
    
  - Глоссарий: glossary/glossary.md
  
  
extra:
  generator: false
  social:
  - icon: fontawesome/brands/github
    link: https://github.com/a18091986edu
    name: GitHub
  - icon: fontawesome/brands/telegram
    link: https://t.me/behappymaniam
    name: Telegram


extra_css:
  - stylesheets/extra.css


